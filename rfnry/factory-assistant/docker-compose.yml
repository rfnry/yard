name: rfnry-factory-assistant

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/factory
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  agent:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry/factory-assistant/server-client-python
    volumes:
      - ../../..:/work
      - /work/yard/examples/rfnry/factory-assistant/server-client-python/.venv
    env_file:
      - path: ./server-client-python/.env
        required: false
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URL=postgresql://factory:factory@postgres:5432/factory
      - NEO4J_URL=bolt://neo4j:7687
    ports:
      - "8301:8301"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "

volumes:
  qdrant_data:
  postgres_data:
  neo4j_data:
