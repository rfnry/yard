name: rfnry-analyst-assistant

services:
  data-backend:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry/analyst-assistant/data-backend
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry/analyst-assistant/data-backend/.venv
    env_file:
      - path: ./data-backend/.env
        required: false
    ports:
      - "8204:8204"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "

  agent:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry/analyst-assistant/server-client-python
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry/analyst-assistant/server-client-python/.venv
    env_file:
      - path: ./server-client-python/.env
        required: false
    ports:
      - "8103:8103"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - data-backend
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "
