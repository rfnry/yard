name: rfnry-chat-customer-support

services:
  agent:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry-chat/customer-support/server-client-python
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry-chat/customer-support/server-client-python/.venv
    env_file:
      - path: ./server-client-python/.env
        required: false
    environment:
      RFNRY_OBSERVABILITY_FORMAT: ${RFNRY_OBSERVABILITY_FORMAT:-json}
    ports:
      - "8000:8000"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "

  web:
    image: node:20-alpine
    working_dir: /work/yard/examples/rfnry-chat/customer-support/client-react
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry-chat/customer-support/client-react/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - agent
