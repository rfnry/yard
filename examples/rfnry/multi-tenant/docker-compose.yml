name: rfnry-multi-tenant

services:
  agent:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry/multi-tenant/server-client-python
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry/multi-tenant/server-client-python/.venv
    env_file:
      - path: ./server-client-python/.env
        required: false
    ports:
      - "8102:8102"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "
