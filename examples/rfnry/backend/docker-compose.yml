name: rfnry-backend

services:
  backend:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry/backend
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry/backend/.venv
    env_file:
      - path: .env
        required: false
    ports:
      - "8200:8200"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "
