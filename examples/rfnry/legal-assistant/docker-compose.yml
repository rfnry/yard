name: rfnry-legal-assistant

services:
  agent:
    image: python:3.13-slim
    working_dir: /work/yard/examples/rfnry/legal-assistant/server-client-python
    volumes:
      - ../../../..:/work
      - /work/yard/examples/rfnry/legal-assistant/server-client-python/.venv
    env_file:
      - path: ./server-client-python/.env
        required: false
    ports:
      - "8102:8102"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run python -m src.main
      "
