name: rfnry-voice-companion-assistant

services:
  server:
    image: python:3.13-slim
    working_dir: /work/yard/examples/voice/companion-assistant/server-python
    volumes:
      - ../../../..:/work
      - /work/yard/examples/voice/companion-assistant/server-python/.venv
    env_file:
      - path: ./server-python/.env
        required: false
    ports:
      - "8401:8401"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run uvicorn src.main:app --host 0.0.0.0 --port 8401
      "

  client:
    image: node:22-slim
    working_dir: /work/yard/examples/voice/companion-assistant/client-react
    volumes:
      - ../../../..:/work
      - /work/yard/examples/voice/companion-assistant/client-react/node_modules
    environment:
      - VITE_VOICE_SERVER_URL=http://localhost:8401
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev"
