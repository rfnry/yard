name: rfnry-voice-support-assistant

services:
  server:
    image: python:3.13-slim
    working_dir: /work/yard/examples/voice/support-assistant/server-python
    volumes:
      - ../../../..:/work
      - /work/yard/examples/voice/support-assistant/server-python/.venv
    env_file:
      - path: ./server-python/.env
        required: false
    ports:
      - "8301:8301"
    command: >
      sh -c "
      pip install -q uv &&
      uv sync --extra dev &&
      uv run uvicorn src.main:app --host 0.0.0.0 --port 8301
      "

  client:
    image: node:22-slim
    working_dir: /work/yard/examples/voice/support-assistant/client-react
    volumes:
      - ../../../..:/work
      - /work/yard/examples/voice/support-assistant/client-react/node_modules
    environment:
      - VITE_API_URL=http://localhost:8301
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
